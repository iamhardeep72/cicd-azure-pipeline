# ═══════════════════════════════════════════════════════════════════
#  GitHub Actions CI/CD Pipeline
#  Triggers on push to main → Build → Docker → ACR → Azure Container Apps
# ═══════════════════════════════════════════════════════════════════

name: 🚀 CI/CD — Build & Deploy to Azure

on:
  push:
    branches:
      - main          # Deploy on every push to main
  pull_request:
    branches:
      - main          # Run tests on every PR (no deploy)
  workflow_dispatch:  # Allow manual trigger from GitHub UI

# ─── ENVIRONMENT VARIABLES ───────────────────────────────────────
env:
  # Azure Container Registry
  ACR_NAME: securecorpacr                      # your ACR name (no .azurecr.io)
  ACR_LOGIN_SERVER: securecorpacr.azurecr.io  # full login server

  # Docker image
  IMAGE_NAME: cicd-demo-site
  IMAGE_TAG: ${{ github.sha }}                 # unique tag per commit

  # Azure Container Apps
  RESOURCE_GROUP: cicd-demo-rg
  CONTAINER_APP_NAME: cicd-demo-app
  CONTAINER_APP_ENV: cicd-demo-env

# ─── JOBS ─────────────────────────────────────────────────────────
jobs:

  # ── JOB 1: VALIDATE ─────────────────────────────────────────────
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Check HTML files exist
        run: |
          echo "Checking project structure..."
          ls -la app/
          test -f app/index.html && echo "✓ index.html found" || (echo "✗ index.html missing!" && exit 1)
          test -f Dockerfile && echo "✓ Dockerfile found" || (echo "✗ Dockerfile missing!" && exit 1)
          echo "All checks passed ✓"

      - name: 🐳 Validate Dockerfile syntax
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3018,DL3008   # ignore alpine/apt version pinning warnings

  # ── JOB 2: BUILD & PUSH DOCKER IMAGE ────────────────────────────
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: validate          # only run if validate passed

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}      # set in GitHub Secrets
          password: ${{ secrets.ACR_PASSWORD }}      # set in GitHub Secrets

      - name: 🏷️ Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}   # don't push on PRs
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha       # use GitHub Actions cache to speed up builds
          cache-to: type=gha,mode=max

      - name: 📋 Print image info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Image pushed to ACR:"
          echo "  ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"
          echo "  ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ── JOB 3: DEPLOY TO AZURE CONTAINER APPS ───────────────────────
  deploy:
    name: 🚀 Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build             # only deploy if build passed
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.app-url }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}    # set in GitHub Secrets

      - name: 🚀 Deploy to Azure Container Apps
        id: deploy
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ env.ACR_NAME }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: 🌐 Get App URL
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Deployment successful!"
          echo "  🌐 Live at: https://$APP_URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ── JOB 4: NOTIFY ───────────────────────────────────────────────
  notify:
    name: 📣 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [validate, build, deploy]
    if: always()   # run even if previous jobs failed

    steps:
      - name: 📊 Print pipeline result
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  PIPELINE SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Validate : ${{ needs.validate.result }}"
          echo "  Build    : ${{ needs.build.result }}"
          echo "  Deploy   : ${{ needs.deploy.result }}"
          echo "  Commit   : ${{ github.sha }}"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "  Actor    : ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
